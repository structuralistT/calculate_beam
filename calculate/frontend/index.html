<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Симулятор Балки — Метод сечений</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        window.MathJax = {
            tex: { inlineMath: [['$', '$']], displayMath: [['$$', '$$']] },
            svg: { fontCache: 'global' }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
    <style>
        /* Tailwind preflight forces every <svg> to display:block, but MathJax
           renders each inline formula as an <svg>. A block-level element can't
           sit mid-line, so the browser was splitting surrounding text onto
           separate lines around every formula. Force formula SVGs back to
           inline so they flow naturally with the surrounding text. */
        mjx-container[jax="SVG"]:not([display="true"]) svg {
            display: inline !important;
        }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen antialiased">

    <div class="container mx-auto px-6 lg:px-12 py-8 max-w-7xl">
        <header class="text-center mb-8">
            <h1 class="text-3xl font-bold text-blue-400">Симулятор Консольной Балки</h1>
            <p class="text-gray-400 text-sm mt-1">Визуализация эпюр и пошаговый расчет</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-[300px_1fr_1fr] gap-6 items-start">
            
            <div class="bg-gray-800 p-5 rounded-xl shadow-lg h-fit">
                <h2 class="text-xl font-semibold mb-4 border-b border-gray-700 pb-2 text-blue-300">Параметры</h2>
                
                <div class="space-y-4">
                    <div>
                        <label class="block text-xs font-medium text-gray-400 mb-1">Длина балки L (м)</label>
                        <input type="number" id="length" value="5" step="0.1" class="w-full bg-gray-700 border border-gray-600 rounded px-3 py-2 text-white focus:outline-none focus:border-blue-500">
                    </div>
                    
                    <div>
                        <label class="block text-xs font-medium text-gray-400 mb-1">Сила на конце F (кН)</label>
                        <input type="number" id="force" value="-10" step="1" class="w-full bg-gray-700 border border-gray-600 rounded px-3 py-2 text-white focus:outline-none focus:border-blue-500">
                    </div>
                    
                    <div>
                        <label class="block text-xs font-medium text-gray-400 mb-1">Жесткость EI (кН·м²)</label>
                        <input type="number" id="ei" value="20000" step="100" class="w-full bg-gray-700 border border-gray-600 rounded px-3 py-2 text-white focus:outline-none focus:border-blue-500">
                    </div>
                    
                    <button id="calcBtn" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-medium py-2.5 px-4 rounded transition-colors mt-2 active:scale-[0.98]">
                        Рассчитать
                    </button>
                </div>
            </div>

            <div class="space-y-6 min-w-0">
                <div class="bg-gray-800 p-4 rounded-xl shadow-lg">
                    <h3 class="text-xs font-medium text-gray-400 mb-2 text-center">Расчетная схема балки</h3>
                    <div class="relative w-full bg-gray-950 rounded-lg border border-gray-700">
                        <canvas id="schemeCanvas" class="w-full h-32 block"></canvas>
                    </div>
                </div>

                <div class="bg-gray-800 p-4 rounded-xl shadow-lg">
                    <div class="h-56 min-w-0"><canvas id="chartY"></canvas></div>
                </div>
            </div>

            <div class="space-y-6 min-w-0">
                <div class="bg-gray-800 p-4 rounded-xl shadow-lg">
                    <div class="h-56 min-w-0"><canvas id="chartM"></canvas></div>
                </div>
                
                <div class="bg-gray-800 p-4 rounded-xl shadow-lg">
                    <div class="h-56 min-w-0"><canvas id="chartQ"></canvas></div>
                </div>
            </div>
        </div>

        <div class="mt-6 bg-gray-800 p-6 rounded-xl shadow-lg">
            <h2 class="text-xl font-semibold mb-4 border-b border-gray-700 pb-2 text-blue-300">Пошаговое решение (Метод сечений)</h2>
            <div id="solutionBlock" class="font-sans text-gray-200 text-sm md:text-base leading-relaxed space-y-3"></div>
        </div>

    </div>

    <script src="app.js"></script>
</body>
</html>
